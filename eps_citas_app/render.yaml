services:
  - type: web
    name: eps-citas-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eps-citas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: eps-citas-db
    plan: free
