{% extends 'base.html' %}
{% block title %}Actualizar Cita{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h2>✏️ Actualizar Cita</h2>
    <p>Modifica los datos de la cita médica seleccionada.</p>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-grid">

        <div class="form-group full">
          <label for="medico">Médico Asignado</label>
          <input type="text" id="medico" name="medico"
                 value="{{ cita.medico }}" required/>
        </div>

        <div class="form-group full">
          <label for="tipo_cita">Tipo de Cita</label>
          <select id="tipo_cita" name="tipo_cita" required>
            <option value="General"      {% if cita.tipo_cita=='General' %}selected{% endif %}>General</option>
            <option value="Odontología"  {% if cita.tipo_cita=='Odontología' %}selected{% endif %}>Odontología</option>
            <option value="Especialista" {% if cita.tipo_cita=='Especialista' %}selected{% endif %}>Especialista</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fecha">Nueva Fecha</label>
          <input type="date" id="fecha" name="fecha"
                 value="{{ cita.fecha }}" required/>
        </div>

        <div class="form-group">
          <label for="hora">Nueva Hora</label>
          <input type="time" id="hora" name="hora"
                 value="{{ cita.hora }}" required/>
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-warning">✏️ Guardar Cambios</button>
        <a href="{{ url_for('consulta_cita') }}" class="btn btn-ghost">← Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
