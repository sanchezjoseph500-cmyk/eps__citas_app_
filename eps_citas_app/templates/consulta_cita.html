{% extends 'base.html' %}
{% block title %}Consultar Cita{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h2>🔍 Consultar Cita Médica</h2>
    <p>Ingresa tu número de documento para ver tus citas agendadas.</p>
  </div>

  <div class="form-card">
    <form method="POST" action="{{ url_for('resultado_cita') }}">
      <div class="form-group">
        <label for="documento">Número de Identificación</label>
        <input type="text" id="documento" name="documento"
               placeholder="Ej: 1001234567" required maxlength="15"/>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">🔍 Buscar Citas</button>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">← Volver</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
