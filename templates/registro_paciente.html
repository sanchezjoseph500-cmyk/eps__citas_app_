{% extends 'base.html' %}
{% block title %}Registrar Paciente{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h2>👤 Registro de Paciente</h2>
    <p>Complete el formulario para registrar un nuevo paciente en el sistema.</p>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-grid">

        <div class="form-group">
          <label for="documento">N° de Identificación</label>
          <input type="text" id="documento" name="documento"
                 placeholder="Ej: 1001234567" required maxlength="15"/>
        </div>

        <div class="form-group">
          <label for="eps">EPS Asignada</label>
          <select id="eps" name="eps">
            <option value="">— Seleccione —</option>
            <option>Sanitas</option>
            <option>Compensar</option>
            <option>Famisanar</option>
            <option>Nueva EPS</option>
            <option>Sura</option>
            <option>Medimás</option>
            <option>Coomeva</option>
            <option>Otra</option>
          </select>
        </div>

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre"
                 placeholder="Ej: Carlos" required/>
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido"
                 placeholder="Ej: Rodríguez" required/>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono"
                 placeholder="Ej: 3001234567"/>
        </div>

        <div class="form-group">
          <label for="correo">Correo Electrónico</label>
          <input type="email" id="correo" name="correo"
                 placeholder="correo@ejemplo.com"/>
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">✓ Registrar Paciente</button>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">← Volver</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
