{% extends 'base.html' %}
{% block title %}Reservar Cita{% endblock %}

{% block content %}
<div class="page">
  <div class="page-header">
    <h2>📅 Reservar Cita Médica</h2>
    <p>Asigna una cita a un paciente registrado en el sistema.</p>
  </div>

  <div class="form-card">
    <form method="POST">
      <div class="form-grid">

        <div class="form-group full">
          <label for="documento">Documento del Paciente</label>
          <input type="text" id="documento" name="documento"
                 placeholder="Ingrese el número de documento del paciente" required/>
        </div>

        <div class="form-group">
          <label for="medico">Médico Asignado</label>
          <input type="text" id="medico" name="medico"
                 placeholder="Ej: Dr. Juan Pérez" required/>
        </div>

        <div class="form-group">
          <label for="tipo_cita">Tipo de Cita</label>
          <select id="tipo_cita" name="tipo_cita" required>
            <option value="">— Seleccione —</option>
            <option value="General">General</option>
            <option value="Odontología">Odontología</option>
            <option value="Especialista">Especialista</option>
          </select>
        </div>

        <div class="form-group">
          <label for="fecha">Fecha de la Cita</label>
          <input type="date" id="fecha" name="fecha" required/>
        </div>

        <div class="form-group">
          <label for="hora">Hora de la Cita</label>
          <input type="time" id="hora" name="hora" required/>
        </div>

        <div class="form-group full">
          <label for="direccion_eps">Dirección de la EPS</label>
          <input type="text" id="direccion_eps" name="direccion_eps"
                 placeholder="Ej: Cra 7 # 32-16, Bogotá"/>
        </div>

      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-success">📅 Reservar Cita</button>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">← Volver</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
